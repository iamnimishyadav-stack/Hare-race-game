<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forest Hare Race</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">
    <button onclick="createRoom()">Create Race</button>
</div>

<h3 id="role"></h3>

<div id="track">
   <img id="finish" src="./assets/flag.png">
   <div id="hare">🐰</div>
   <div id="tortoise">🐢</div>
</div>

<div id="energyBar">
   <div id="energy"></div>
</div>

<div id="controls">
    <button id="moveBtn">RUN</button>
    <button id="boostBtn">BOOST</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
